<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Community Write-Ins · Rasa Writing Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Potta+One&family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:    #fdf4e0;
  --parchment:#f0e2c0;
  --tan:      #dfc99a;
  --orange:   #d4621a;
  --orange2:  #b84e10;
  --rust:     #8b3a0f;
  --gold:     #c9920a;
  --green:    #3a6435;
  --green2:   #2b4e27;
  --green3:   #1e3a1b;
  --teal:     #2e6e6e;
  --dark:     #2a1a08;
  --brown:    #6b3a1f;
  --muted:    #8a6a4a;
  --border:   #c4a464;

  /* Two fonts only: Potta One for display, DM Sans for everything else */
  --fd: 'Potta One', cursive;
  --fb: 'DM Sans', sans-serif;

  /* One base size; all others are multiples */
  --sz-xs:  11px;
  --sz-sm:  13px;
  --sz-md:  15px;
  --sz-lg:  18px;
  --sz-xl:  22px;

  --s1: #d4621a;
  --s2: #8b3a0f;
  --s3: #c9920a;
  --s4: #3a6435;
  --s5: #2e6e6e;
  --s6: #7a3d6e;
  --s7: #3d5e7a;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--fb);
  font-size: var(--sz-sm);
  background: var(--parchment);
  color: var(--dark);
  display: flex;
  flex-direction: column;
  background-image:
    repeating-linear-gradient(0deg,   transparent, transparent 39px, rgba(160,120,60,0.1) 39px, rgba(160,120,60,0.1) 40px),
    repeating-linear-gradient(90deg,  transparent, transparent 39px, rgba(160,120,60,0.1) 39px, rgba(160,120,60,0.1) 40px),
    linear-gradient(150deg, #f7eccb 0%, #eddcae 55%, #e5d4a0 100%);
}

/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
header {
  background: var(--green);
  border-bottom: 4px solid var(--green3);
  padding: 9px 20px 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  /* subtle wood-grain stripe */
  background-image: repeating-linear-gradient(
    90deg, transparent, transparent 60px,
    rgba(255,255,255,0.02) 60px, rgba(255,255,255,0.02) 61px
  ), linear-gradient(180deg, #3a6435 0%, #2e5029 100%);
}
.header-icon { font-size: 30px; flex-shrink: 0; }
.header-text { display: flex; flex-direction: column; gap: 1px; }
.header-studio {
  font-family: var(--fb); font-style: italic; font-size: var(--sz-xs);
  color: rgba(255,255,255,0.5); letter-spacing: 0.1em;
}
.header-title {
  font-family: var(--fd); font-size: clamp(17px, 2.6vw, 26px);
  color: #fff; letter-spacing: 0.03em; line-height: 1;
}
.header-sub {
  font-family: var(--fb); font-style: italic; font-size: var(--sz-xs);
  color: rgba(255,255,255,0.45);
}
.host-badge {
  display: none; margin-left: auto;
  background: var(--orange); color: white;
  font-family: var(--fb); font-size: var(--sz-xs); font-weight: 700;
  padding: 3px 12px; border-radius: 20px; letter-spacing: 0.12em; text-transform: uppercase;
}
body.host .host-badge { display: block; }

/* ══════════════════════════════════════════════
   BODY GRID: left col | right col
══════════════════════════════════════════════ */
.body-grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: 240px 1fr;
}

/* ══════════════════════════════════════════════
   LEFT PANEL — timer + controls
══════════════════════════════════════════════ */
.left-panel {
  background: var(--green);
  background-image: linear-gradient(170deg, #3a6435 0%, #2b4e27 100%);
  border-right: 4px solid var(--green3);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px 18px; gap: 12px;
  position: relative; overflow: hidden;
}
/* decorative quill watermark */
.left-panel::after {
  content: '✍️';
  position: absolute; font-size: 100px;
  bottom: -12px; right: -10px; opacity: 0.07; pointer-events: none;
}

/* ── Timer box ── */
.timer-box {
  width: 100%;
  background: var(--green3);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px 10px 10px;
  text-align: center;
  box-shadow: inset 0 3px 10px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.07);
  overflow: hidden;
}
.sprint-label {
  font-family: var(--fb); font-size: var(--sz-xs);
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.4); margin-bottom: 3px;
}
.timer-display {
  font-family: var(--fd);
  font-size: clamp(44px, 5vw, 64px);
  color: var(--orange);
  line-height: 1; letter-spacing: 0.03em;
  text-shadow: 0 0 30px rgba(212,98,26,0.55);
  transition: color 0.4s, text-shadow 0.4s;
  white-space: nowrap; overflow: hidden;
}
.timer-display.urgent {
  color: #ff4444;
  text-shadow: 0 0 30px rgba(255,68,68,0.65);
  animation: pulse 0.8s infinite alternate;
}
@keyframes pulse { from { opacity:1 } to { opacity:0.6 } }
.timer-status {
  font-family: var(--fb); font-style: italic; font-size: var(--sz-xs);
  color: rgba(255,255,255,0.38); margin-top: 5px; min-height: 15px;
}

/* ── Duration pills ── */
.duration-row { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.duration-btn {
  background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.7); padding: 4px 11px; border-radius: 20px;
  font-family: var(--fb); font-size: var(--sz-xs); font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.duration-btn:hover, .duration-btn.active {
  background: var(--orange); border-color: var(--orange); color: white;
}

/* ── Big action buttons ── */
.action-stack { display: flex; flex-direction: column; gap: 7px; width: 100%; }
.big-btn {
  font-family: var(--fd); font-size: var(--sz-sm);
  padding: 9px 16px; border-radius: 10px; border: none; cursor: pointer;
  letter-spacing: 0.05em; text-transform: uppercase; width: 100%;
  box-shadow: 0 3px 0 rgba(0,0,0,0.35); transition: all 0.15s;
}
.big-btn:active { transform: translateY(2px); box-shadow: none; }
.btn-start { background: var(--orange); color: white; }
.btn-start:hover { background: var(--orange2); }
.btn-end   { background: #7a3010; color: white; }
.btn-end:hover { background: #5a2008; }
.btn-next  { background: #4a7a3a; color: white; }
.btn-next:hover { background: #3a6030; }
.btn-reset {
  background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7);
  font-family: var(--fb); font-size: var(--sz-xs); font-weight: 700;
  padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer;
  letter-spacing: 0.05em; text-transform: uppercase;
  box-shadow: 0 2px 0 rgba(0,0,0,0.25); transition: all 0.15s;
}
.btn-reset:hover { background: rgba(255,255,255,0.2); }

/* host-only hidden for participants */
.host-only { display: none; }
body.host .host-only { display: flex; }

/* ══════════════════════════════════════════════
   RIGHT PANEL
══════════════════════════════════════════════ */
.right-panel {
  display: flex; flex-direction: column;
  padding: 12px 14px 10px; gap: 10px; min-height: 0; overflow: hidden;
}

/* ══════════════════════════════════════════════
   HOST DATA CARD
══════════════════════════════════════════════ */
.host-data-card {
  display: none;
  background: rgba(255,255,255,0.82);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px 9px;
  flex-direction: column; gap: 8px;
  box-shadow: 0 2px 12px rgba(100,60,10,0.1);
  flex-shrink: 0;
}
body.host .host-data-card { display: flex; }

.card-title {
  font-family: var(--fd); font-size: var(--sz-sm);
  color: var(--brown); letter-spacing: 0.05em;
}

/* ── Writer grid ── */
.writer-grid { overflow-x: auto; }
.writer-grid::-webkit-scrollbar { height: 3px; }
.writer-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Grid uses a CSS grid so columns are perfectly aligned */
.wg-table { display: grid; gap: 0; min-width: max-content; }

/* header row */
.wg-header {
  display: contents; /* each child placed into grid */
}
.wg-h-icon, .wg-h-name { /* spacer cells */
  padding-bottom: 4px; border-bottom: 1.5px solid var(--tan);
}
.wg-h-sprint {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  padding: 0 4px 4px; border-bottom: 1.5px solid var(--tan);
}
.wg-h-sprint-name {
  font-family: var(--fb); font-size: var(--sz-xs); font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.wg-h-sprint-subs {
  display: flex; gap: 4px;
}
.wg-h-sub {
  font-family: var(--fb); font-size: 10px; color: var(--muted);
  text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}

/* data rows */
.wg-row { display: contents; }
.wg-cell {
  display: flex; align-items: center;
  padding: 4px 0; border-bottom: 1px solid rgba(200,170,100,0.2);
}
.wg-cell-icon { justify-content: center; }
.wg-cell-name {
  font-family: var(--fb); font-size: var(--sz-sm); font-weight: 700;
  color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-right: 8px;
}
.wg-cell-pair { display: flex; gap: 4px; padding: 0 4px; justify-content: center; }
.wg-cell-remove { justify-content: center; }

.wc-in {
  width: 76px; /* wide enough for 6 digits comfortably */
  padding: 5px 6px; border-radius: 7px; text-align: center;
  font-family: var(--fb); font-size: var(--sz-sm); font-weight: 600;
  color: var(--dark); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.wc-in.start-in { border: 1.5px solid #cdc0a8; background: #faf6ee; }
.wc-in.end-in   { border: 1.5px solid #c4743a; background: #fff5ed; }
.wc-in:focus    { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,146,10,0.18); }

.remove-btn {
  background: none; border: none; color: #cc4444; font-size: var(--sz-sm);
  cursor: pointer; padding: 0 4px; line-height: 1; opacity: 0.5;
}
.remove-btn:hover { opacity: 1; }

/* ── Action strip ── */
.host-action-strip {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding-top: 7px; border-top: 1.5px solid var(--tan);
}
.pill-btn {
  font-family: var(--fb); font-weight: 700; font-size: var(--sz-xs);
  padding: 6px 14px; border-radius: 20px; border: none; cursor: pointer;
  letter-spacing: 0.05em; transition: all 0.15s;
}
.pill-update { background: var(--rust); color: white; }
.pill-update:hover { background: #6a2808; }
.pill-sprint { background: var(--teal); color: white; }
.pill-sprint:hover { background: #1e5050; }

/* ── Add writer ── */
.add-writer-strip {
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  margin-left: auto;
}
.add-label {
  font-family: var(--fb); font-size: var(--sz-xs); font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
}
/* Bigger emoji select */
.add-icon-sel {
  border: 1.5px solid var(--border); border-radius: 8px; background: white;
  padding: 3px 6px; font-size: 22px; cursor: pointer; outline: none;
  line-height: 1.3; height: 36px;
}
.add-name-in {
  border: 1.5px solid var(--border); border-radius: 8px; background: white;
  padding: 5px 10px; font-family: var(--fb); font-size: var(--sz-sm);
  color: var(--dark); width: 100px; outline: none;
}
.add-name-in:focus { border-color: var(--orange); }
.add-writer-btn {
  background: var(--orange); color: white; border: none; border-radius: 8px;
  padding: 6px 14px; font-family: var(--fb); font-weight: 700;
  font-size: var(--sz-xs); cursor: pointer; letter-spacing: 0.05em;
}
.add-writer-btn:hover { background: var(--orange2); }

/* ══════════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════════ */
.leaderboard-card {
  background: rgba(255,255,255,0.82);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px 12px;
  flex: 1; min-height: 0;
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: 0 2px 12px rgba(100,60,10,0.1);
  overflow: hidden;
}
.lb-header {
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.lb-title { font-family: var(--fd); font-size: var(--sz-xl); color: var(--dark); }
.lb-subtitle {
  font-family: var(--fb); font-size: var(--sz-xs); font-weight: 700;
  color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
  background: var(--tan); padding: 3px 10px; border-radius: 20px;
}

.lb-rows {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 7px;
}
.lb-rows::-webkit-scrollbar { width: 3px; }
.lb-rows::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.lb-row { display: flex; align-items: center; gap: 10px; }
.lb-rank {
  font-family: var(--fd); font-size: var(--sz-lg); min-width: 28px;
  text-align: center; flex-shrink: 0;
}
.lb-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
.lb-name { font-family: var(--fb); font-weight: 700; font-size: var(--sz-sm); min-width: 64px; flex-shrink: 0; }
.lb-bar-wrap {
  flex: 1; height: 22px; background: var(--parchment);
  border-radius: 5px; overflow: hidden; display: flex;
  border: 1px solid var(--tan);
}
.lb-segment {
  height: 100%; transition: width 0.7s cubic-bezier(.34,1,.64,1); min-width: 0;
}
.lb-segment:first-child  { border-radius: 4px 0 0 4px; }
.lb-segment:last-child:not(:first-child) { border-radius: 0 4px 4px 0; }
.lb-segment:only-child   { border-radius: 4px; }
.lb-total {
  font-family: var(--fb); font-weight: 700; font-size: var(--sz-md);
  min-width: 58px; text-align: right; flex-shrink: 0; color: var(--brown);
}
.lb-badge { font-size: var(--sz-lg); min-width: 24px; text-align: center; flex-shrink: 0; }

.lb-empty {
  font-family: var(--fb); font-style: italic; font-size: var(--sz-sm);
  color: var(--muted); text-align: center; padding: 18px 0;
}

/* ══════════════════════════════════════════════
   CONFETTI & TOAST
══════════════════════════════════════════════ */
#confetti-canvas { position: fixed; top:0; left:0; pointer-events:none; z-index:9999; }
.toast {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--dark); color: var(--cream);
  padding: 9px 20px; border-radius: 30px;
  font-family: var(--fb); font-size: var(--sz-sm); font-weight: 700; letter-spacing: 0.06em;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 1000; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header>
  <div class="header-icon">📖</div>
  <div class="header-text">
    <span class="header-studio">Rasa Writing Studio presents</span>
    <span class="header-title">VIRTUAL COMMUNITY WRITE-INS</span>
    <span class="header-sub">Every word counts.</span>
  </div>
  <span class="host-badge">HOST</span>
</header>

<!-- BODY -->
<div class="body-grid">

  <!-- ═══ LEFT: TIMER ═══ -->
  <div class="left-panel">
    <div class="timer-box">
      <div class="sprint-label" id="sprint-label">Welcome to Sprints</div>
      <div class="timer-display" id="timer-display">20:00</div>
      <div class="timer-status" id="timer-status">Waiting to begin…</div>
    </div>

    <div class="duration-row host-only" id="duration-row">
      <button class="duration-btn" onclick="setDuration(15)">15 min</button>
      <button class="duration-btn active" onclick="setDuration(20)">20 min</button>
      <button class="duration-btn" onclick="setDuration(25)">25 min</button>
      <button class="duration-btn" onclick="setDuration(30)">30 min</button>
      <button class="duration-btn" onclick="setDuration(40)">40 min</button>
    </div>

    <div class="action-stack host-only" style="flex-direction:column;">
      <button class="big-btn btn-start" id="btn-start" onclick="hostStart()">▶ Start Sprint</button>
      <button class="big-btn btn-end"   id="btn-end"   onclick="hostEnd()"  style="display:none">⏹ End Sprint</button>
      <button class="big-btn btn-next"  id="btn-next"  onclick="hostNext()" style="display:none">→ Next Sprint</button>
      <button class="btn-reset"         id="btn-reset" onclick="hostReset()" style="display:none">↺ Reset All</button>
    </div>
  </div>

  <!-- ═══ RIGHT: DATA + LEADERBOARD ═══ -->
  <div class="right-panel">

    <!-- Host data entry card -->
    <div class="host-data-card">
      <div class="card-title">📋 Writers &amp; Word Counts</div>
      <div class="writer-grid" id="writer-grid"></div>
      <div class="host-action-strip">
        <button class="pill-btn pill-update" onclick="updateLeaderboard()">Update Leaderboard</button>
        <button class="pill-btn pill-sprint" onclick="addSprint()">+ Add Sprint</button>
        <div class="add-writer-strip">
          <span class="add-label">Add:</span>
          <select id="add-icon-select" class="add-icon-sel"></select>
          <input type="text" class="add-name-in" id="add-name" placeholder="Name"/>
          <button class="add-writer-btn" onclick="hostAddWriter()">+ Add</button>
        </div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="leaderboard-card">
      <div class="lb-header">
        <span class="lb-title">🏆 Leaderboard</span>
        <span class="lb-subtitle" id="lb-sprint-label">No sprints yet</span>
      </div>
      <div class="lb-rows" id="leaderboard-rows">
        <p class="lb-empty" id="lb-empty">Complete a sprint to see results here.</p>
      </div>
    </div>

  </div>
</div>

<script>
const ICONS = ['🦔','🐺','🦡','🦝','🐰','🦊','🐻','🦌','🐿️','🦦'];
const SPRINT_COLORS = ['#d4621a','#8b3a0f','#c9920a','#3a6435','#2e6e6e','#7a3d6e','#3d5e7a'];
const MEDALS = ['🥇','🥈','🥉'];

let state = {
  duration: 20,
  currentSprint: 0,
  numSprintCols: 1,
  timerRunning: false,
  timerEnd: null,
  timerInterval: null,
  writers: [],
};

// Default to host; append ?participant=true for participant view
const isHost = !new URLSearchParams(location.search).has('participant');
if (isHost) document.body.classList.add('host');

window.onload = () => {
  renderIconSelect();
  renderWriterGrid();
  renderLeaderboard();
  setTimerDisplay(state.duration * 60);
};

// ── ICON SELECT ────────────────────────────────────────────────────────
function renderIconSelect() {
  const sel = document.getElementById('add-icon-select');
  sel.innerHTML = ICONS.map(i => `<option value="${i}">${i}</option>`).join('');
}

// ── WRITER GRID ────────────────────────────────────────────────────────
// Grid uses CSS grid with explicit column template so headers & inputs align perfectly
function renderWriterGrid() {
  const container = document.getElementById('writer-grid');
  container.innerHTML = '';

  if (state.writers.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--muted);font-style:italic;padding:2px 0">No writers yet — add one below.</p>';
    return;
  }

  // Build column template: [icon 28px] [name 90px] [pair*N] [remove 28px]
  // Each pair = 2 inputs of 76px + 4px gap = 156px + 8px padding = ~168px
  const pairWidth = 168; // px per sprint column
  const cols = `28px 90px repeat(${state.numSprintCols}, ${pairWidth}px) 28px`;

  const table = document.createElement('div');
  table.className = 'wg-table';
  table.style.gridTemplateColumns = cols;

  // ── Header ──
  // Spacer for icon + name columns
  const hIcon = document.createElement('div');
  hIcon.className = 'wg-h-icon wg-h-name';
  const hName = document.createElement('div');
  hName.className = 'wg-h-name';
  table.appendChild(hIcon);
  table.appendChild(hName);

  for (let s = 1; s <= state.numSprintCols; s++) {
    const col = document.createElement('div');
    col.className = 'wg-h-sprint';
    col.innerHTML = `
      <div class="wg-h-sprint-name" style="color:${SPRINT_COLORS[s-1]||'#888'}">Sprint ${s}</div>
      <div class="wg-h-sprint-subs">
        <div class="wg-h-sub" style="width:76px">Start</div>
        <div class="wg-h-sub" style="width:76px">End</div>
      </div>`;
    table.appendChild(col);
  }
  // spacer for remove button
  const hRemove = document.createElement('div');
  hRemove.className = 'wg-h-name';
  hRemove.style.borderBottom = '1.5px solid var(--tan)';
  table.appendChild(hRemove);

  // ── Rows ──
  state.writers.forEach((w, wi) => {
    // icon cell
    const iconCell = document.createElement('div');
    iconCell.className = 'wg-cell wg-cell-icon';
    iconCell.innerHTML = `<span style="font-size:18px">${w.icon}</span>`;
    table.appendChild(iconCell);

    // name cell
    const nameCell = document.createElement('div');
    nameCell.className = 'wg-cell wg-cell-name';
    nameCell.textContent = w.name;
    nameCell.title = w.name;
    table.appendChild(nameCell);

    // sprint pair cells
    for (let s = 0; s < state.numSprintCols; s++) {
      const sp = w.sprints[s] || {};
      const pairCell = document.createElement('div');
      pairCell.className = 'wg-cell wg-cell-pair';
      pairCell.innerHTML = `
        <input class="wc-in start-in" type="number" placeholder="—"
          value="${sp.start != null ? sp.start : ''}"
          onchange="hostUpdateCount(${wi},${s},'start',this.value)"
          title="Sprint ${s+1} start"/>
        <input class="wc-in end-in" type="number" placeholder="—"
          value="${sp.end != null ? sp.end : ''}"
          onchange="hostUpdateCount(${wi},${s},'end',this.value)"
          title="Sprint ${s+1} end"/>`;
      table.appendChild(pairCell);
    }

    // remove button cell
    const removeCell = document.createElement('div');
    removeCell.className = 'wg-cell wg-cell-remove';
    removeCell.innerHTML = `<button class="remove-btn" onclick="removeWriter(${wi})" title="Remove">✕</button>`;
    table.appendChild(removeCell);
  });

  container.appendChild(table);
}

function hostUpdateCount(wi, si, field, val) {
  const w = state.writers[wi];
  while (w.sprints.length <= si) w.sprints.push({});
  w.sprints[si][field] = val === '' ? null : (parseInt(val) || 0);
}

function hostAddWriter() {
  const icon = document.getElementById('add-icon-select').value;
  const name = document.getElementById('add-name').value.trim();
  if (!name) { showToast('Enter a name first.'); return; }
  state.writers.push({ id: Date.now().toString(36), name, icon, sprints: [] });
  document.getElementById('add-name').value = '';
  renderWriterGrid();
  renderLeaderboard();
}

function removeWriter(wi) {
  state.writers.splice(wi, 1);
  renderWriterGrid();
  renderLeaderboard();
}

function addSprint() {
  // Auto-fill start of new sprint = end of previous sprint for each writer
  const newCol = state.numSprintCols; // 0-indexed new column index
  state.writers.forEach(w => {
    while (w.sprints.length <= newCol) w.sprints.push({});
    const prevEnd = newCol > 0 ? (w.sprints[newCol - 1]?.end ?? null) : null;
    // Only pre-fill if not already set and previous end exists
    if (w.sprints[newCol].start == null && prevEnd !== null) {
      w.sprints[newCol].start = prevEnd;
    }
  });
  state.numSprintCols++;
  renderWriterGrid();
  const grid = document.getElementById('writer-grid');
  setTimeout(() => { grid.scrollLeft = grid.scrollWidth; }, 50);
  showToast(`Sprint ${state.numSprintCols} column added!`);
}

// ── TIMER ──────────────────────────────────────────────────────────────
function setDuration(mins) {
  state.duration = mins;
  document.querySelectorAll('.duration-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.textContent) === mins));
  if (!state.timerRunning) setTimerDisplay(mins * 60);
}

function setTimerDisplay(secs) {
  const m = String(Math.floor(secs / 60)).padStart(2,'0');
  const s = String(secs % 60).padStart(2,'0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
  document.getElementById('timer-display').classList.toggle('urgent', secs <= 60 && secs > 0);
}

function hostStart() {
  state.currentSprint++;
  state.timerRunning = true;
  state.timerEnd = Date.now() + state.duration * 60 * 1000;
  document.getElementById('sprint-label').textContent = `Sprint #${state.currentSprint}`;
  document.getElementById('timer-status').textContent = `Sprint #${state.currentSprint} is live — write!`;
  show('btn-start', false); show('btn-end', true);
  document.getElementById('duration-row').style.opacity = '0.3';
  document.getElementById('duration-row').style.pointerEvents = 'none';
  playChime('start');
  state.timerInterval = setInterval(() => {
    const left = Math.max(0, Math.round((state.timerEnd - Date.now()) / 1000));
    setTimerDisplay(left);
    if (left === 0) {
      clearInterval(state.timerInterval);
      state.timerRunning = false;
      document.getElementById('timer-status').textContent = `Sprint #${state.currentSprint} done! Collect word counts.`;
      show('btn-end', false); show('btn-next', true); show('btn-reset', true);
      playChime('end');
    }
  }, 500);
}

function hostEnd() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  setTimerDisplay(0);
  document.getElementById('timer-status').textContent = `Sprint #${state.currentSprint} ended. Collect counts.`;
  show('btn-end', false); show('btn-next', true); show('btn-reset', true);
  playChime('end');
}

function hostNext() {
  show('btn-next', false); show('btn-reset', false); show('btn-start', true);
  document.getElementById('duration-row').style.opacity = '';
  document.getElementById('duration-row').style.pointerEvents = '';
  setTimerDisplay(state.duration * 60);
  document.getElementById('timer-status').textContent = 'Ready for next sprint…';
  document.getElementById('sprint-label').textContent = `Sprint #${state.currentSprint + 1} — Ready`;
}

function hostReset() {
  if (!confirm('Reset all sprints and clear the leaderboard?')) return;
  clearInterval(state.timerInterval);
  Object.assign(state, { currentSprint:0, numSprintCols:1, timerRunning:false });
  state.writers.forEach(w => w.sprints = []);
  document.getElementById('sprint-label').textContent = 'Welcome to Sprints';
  document.getElementById('timer-status').textContent = 'Waiting to begin…';
  show('btn-start', true); show('btn-end', false); show('btn-next', false); show('btn-reset', false);
  document.getElementById('duration-row').style.opacity = '';
  document.getElementById('duration-row').style.pointerEvents = '';
  setTimerDisplay(state.duration * 60);
  renderWriterGrid(); renderLeaderboard();
}

function show(id, visible) {
  document.getElementById(id).style.display = visible ? 'inline-block' : 'none';
}

// ── LEADERBOARD ────────────────────────────────────────────────────────
function updateLeaderboard() {
  renderLeaderboard();
  showToast('Leaderboard updated!');
  if (state.writers.some(w => w.sprints.some(s => ((s.end||0)-(s.start||0)) > 0)))
    fireConfetti();
}

function renderLeaderboard() {
  const container = document.getElementById('leaderboard-rows');
  const empty = document.getElementById('lb-empty');
  const label = document.getElementById('lb-sprint-label');

  const ranked = state.writers.map(w => {
    const sprintTotals = w.sprints.map(s => Math.max(0, (s.end||0)-(s.start||0)));
    const total = sprintTotals.reduce((a,b) => a+b, 0);
    return { ...w, sprintTotals, total };
  }).sort((a,b) => b.total - a.total);

  const hasData = ranked.some(w => w.total > 0);
  empty.style.display = hasData ? 'none' : 'block';
  label.textContent = hasData
    ? `${state.numSprintCols} Sprint${state.numSprintCols !== 1 ? 's' : ''}`
    : 'No sprints yet';

  [...container.querySelectorAll('.lb-row')].forEach(r => r.remove());
  if (!hasData) return;

  const maxTotal = ranked[0]?.total || 1;
  ranked.forEach((w, i) => {
    if (w.total === 0) return;
    const row = document.createElement('div');
    row.className = 'lb-row';
    const segs = w.sprintTotals.map((t, si) => {
      const pct = (t / maxTotal * 100).toFixed(1);
      return `<div class="lb-segment" style="width:${pct}%;background:${SPRINT_COLORS[si]||'#888'}"
        title="Sprint ${si+1}: +${t.toLocaleString()} words"></div>`;
    }).join('');
    row.innerHTML = `
      <div class="lb-rank">${MEDALS[i] || (i+1)}</div>
      <div class="lb-icon">${w.icon}</div>
      <div class="lb-name">${w.name}</div>
      <div class="lb-bar-wrap">${segs}</div>
      <div class="lb-total">+${w.total.toLocaleString()}</div>`;
    container.appendChild(row);
  });
}

// ── SOUND ──────────────────────────────────────────────────────────────
function playChime(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = type === 'start'
      ? [{f:523,t:0},{f:659,t:0.12},{f:784,t:0.24}]
      : [{f:784,t:0},{f:659,t:0.15},{f:523,t:0.3},{f:392,t:0.5}];
    notes.forEach(({f,t}) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = f;
      gain.gain.setValueAtTime(0.001, ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime+t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.5);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.6);
    });
  } catch(e) {}
}

// ── CONFETTI ───────────────────────────────────────────────────────────
function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#d4621a','#f5d57a','#c9920a','#8bbd5a','#4a9ee0','#fdf4e0','#8b3a0f'];
  let parts = Array.from({length:150}, () => ({
    x:Math.random()*canvas.width, y:-20,
    w:Math.random()*12+4, h:Math.random()*6+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*4, vy:Math.random()*4+2,
    angle:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.15, opacity:1
  }));
  let raf;
  (function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin; p.opacity-=0.005;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    parts = parts.filter(p=>p.opacity>0);
    if (parts.length) raf=requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

// ── TOAST ──────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
