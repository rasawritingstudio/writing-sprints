<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Writing Sprints</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Potta+One&display=swap" rel="stylesheet">
  
<style>
  :root {
    --tan:    #e8d9b8;
    --tan2:   #d4c49a;
    --cream:  #fdf6e3;
    --orange: #e07b2a;
    --orange2:#c96a18;
    --brown:  #8b4513;
    --dark:   #3a2210;
    --s1:     #e07b2a;
    --s2:     #b85c1a;
    --s3:     #d4922a;
    --s4:     #7a9e4a;
    --s5:     #4a7a9e;
    --bg:     #f5ead0;
    --card:   #fdf6e3;
    --border: #c8ad7a;
    --muted:  #9a8060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Faculty Glyphic', sans-serif;
    background: var(--bg);
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8ad7a' fill-opacity='0.8'%3E%3Cpath d='M0 0h80v80H0z'/%3E%3Cpath fill='none' stroke='%23c8ad7a' stroke-opacity='0.5' d='M0 40h80M40 0v80'/%3E%3C/g%3E%3C/svg%3E");
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--tan);
    border-bottom: 2px solid var(--border);
    padding: 18px 24px 14px;
    text-align: center;
    position: relative;
  }
  header h1 {
    font-family: 'Potta One', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    color: var(--dark);
    letter-spacing: 0.04em;
  }
  header p { font-size: 12px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 3px; }
  .host-badge {
    display: none;
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    background: var(--orange); color: white; font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  body.host .host-badge { display: block; }

  /* ── TIMER HERO ──────────────────────────────── */
  .timer-hero {
    background: var(--tan);
    border-bottom: 2px solid var(--border);
    padding: 28px 20px 22px;
    text-align: center;
  }
  .sprint-label {
    font-family: 'Potta One', sans-serif;
    font-size: clamp(15px, 3vw, 20px);
    color: var(--brown);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .timer-display {
    font-family: 'Potta one', sans-serif;
    font-size: clamp(64px, 18vw, 110px);
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
    letter-spacing: 0.02em;
    transition: color 0.4s;
  }
  .timer-display.urgent { color: #c0392b; animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
  .timer-status { font-size: 13px; color: var(--muted); margin-top: 8px; min-height: 20px; letter-spacing: 0.05em; }

  /* ── HOST TIMER CONTROLS ─────────────────────── */
  .host-controls {
    display: none;
    background: #fef9ee;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 16px auto;
    max-width: 600px;
    gap: 12px;
    flex-direction: column;
    align-items: center;
  }
  body.host .host-controls { display: flex; }
  .host-controls-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
  .host-label { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); width: 100%; text-align: center; }
  .duration-btn {
    background: white; border: 1.5px solid var(--border); color: var(--dark);
    padding: 6px 14px; border-radius: 20px; font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .duration-btn.active, .duration-btn:hover { background: var(--orange); border-color: var(--orange); color: white; }
  .big-btn {
    font-family: 'Faculty Glyphic', sans-serif; font-weight: 700; font-size: 15px;
    padding: 11px 28px; border-radius: 8px; border: none; cursor: pointer;
    letter-spacing: 0.05em; transition: all 0.15s; text-transform: uppercase;
  }
  .btn-start { background: var(--orange); color: white; }
  .btn-start:hover { background: var(--orange2); }
  .btn-end { background: var(--brown); color: white; }
  .btn-end:hover { background: #6b3410; }
  .btn-next { background: #4a7a3a; color: white; }
  .btn-next:hover { background: #3a6030; }
  .btn-reset { background: #888; color: white; font-size: 12px; padding: 8px 16px; }
  .btn-reset:hover { background: #666; }

  /* ── MAIN LAYOUT ─────────────────────────────── */
  .main { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ── HOST DATA ENTRY SECTION ─────────────────── */
  .host-lb-section {
    display: none;
    background: #fef9ee; border: 1.5px dashed var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  body.host .host-lb-section { display: block; }
  .host-lb-section h3 {
    font-family: 'Potta One', sans-serif; font-size: 16px;
    margin-bottom: 14px; color: var(--brown);
  }

  /* scrollable writer grid */
  .writer-grid { overflow-x: auto; padding-bottom: 6px; }

  /* writer rows */
  .host-writer-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; min-width: max-content;
  }
  .icon-sm { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
  .host-writer-name { font-weight: 700; font-size: 13px; width: 90px; flex-shrink: 0; }

  /* sprint column group */
  .sprint-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
  .sprint-col-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; white-space: nowrap;
  }
  .sprint-col-inputs { display: flex; gap: 4px; }
  .host-wc-input {
    width: 68px; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 6px;
    font-family: 'Faculty Glyphic', sans-serif; font-size: 13px; color: var(--dark);
    background: white; outline: none; text-align: center;
  }
  .host-wc-input:focus { border-color: var(--orange); }
  .host-wc-input.start-input { border-color: #c8c0b0; }
  .host-wc-input.end-input   { border-color: var(--orange2); }

  .remove-btn {
    background: none; border: none; color: #c0392b; font-size: 18px; cursor: pointer;
    padding: 0 2px; line-height: 1; flex-shrink: 0;
  }

  /* column header row */
  .grid-header {
    display: flex; align-items: flex-end; gap: 10px;
    margin-bottom: 6px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border); min-width: max-content;
  }
  .grid-header-name { width: 120px; flex-shrink: 0; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .grid-subheader { display: flex; gap: 4px; }
  .grid-subheader span { width: 68px; font-size: 10px; color: var(--muted); text-align: center; }

  /* host bottom action row */
  .host-action-row {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
  }
  .update-lb-btn {
    background: var(--brown); color: white; border: none; border-radius: 7px;
    padding: 9px 20px; font-family: inherit; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: 0.05em;
  }
  .update-lb-btn:hover { background: #6b3410; }
  .add-sprint-btn {
    background: #4a7a9e; color: white; border: none; border-radius: 7px;
    padding: 9px 20px; font-family: inherit; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: 0.05em;
  }
  .add-sprint-btn:hover { background: #3a6080; }

  /* add writer row */
  .add-writer-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-top: 10px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .add-writer-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); }
  .small-input {
    padding: 7px 11px; border: 1.5px solid var(--border); border-radius: 6px;
    font-family: 'Faculty Glyphic', sans-serif; font-size: 13px; color: var(--dark);
    background: white; outline: none;
  }
  .add-btn {
    background: var(--orange); color: white; border: none; border-radius: 6px;
    padding: 7px 16px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .add-btn:hover { background: var(--orange2); }

  /* ── LEADERBOARD ─────────────────────────────── */
  .leaderboard-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 22px 20px; margin-bottom: 24px;
  }
  .lb-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .lb-header h2 { font-family: 'Potta One', sans-serif; font-size: 22px; }
  .lb-header span { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .lb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .lb-icon { font-size: 28px; width: 36px; text-align: center; flex-shrink: 0; }
  .lb-name { font-weight: 700; font-size: 14px; min-width: 80px; flex-shrink: 0; }
  .lb-bar-wrap { flex: 1; height: 28px; background: #ede4cf; border-radius: 6px; overflow: hidden; display: flex; }
  .lb-segment { height: 100%; transition: width 0.6s ease; min-width: 0; }
  .lb-segment:first-child { border-radius: 6px 0 0 6px; }
  .lb-segment:last-child:not(:first-child) { border-radius: 0 6px 6px 0; }
  .lb-segment:only-child { border-radius: 6px; }
  .lb-total { font-weight: 700; font-size: 15px; min-width: 52px; text-align: right; flex-shrink: 0; }
  .lb-star { font-size: 18px; min-width: 22px; flex-shrink: 0; }
  #lb-empty { color: var(--muted); font-size: 14px; font-style: italic; text-align: center; padding: 10px 0; }

  /* ── CONFETTI ─────────────────────────────────── */
  #confetti-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

  /* ── TOAST ────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--dark); color: var(--cream); padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.05em;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1); z-index: 1000; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .lb-name { min-width: 60px; }
    .host-writer-name { width: 70px; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<header>
  <p> Rasa Writing Studio presents </p>
  <h1>Virtual Community Write-ins</h1>
  <p>Every word counts.</p>
  <span class="host-badge">HOST</span>
</header>

<!-- Timer hero -->
<div class="timer-hero">
  <div class="sprint-label" id="sprint-label">WELCOME TO SPRINTS</div>
  <div class="timer-display" id="timer-display">20:00</div>
  <div class="timer-status" id="timer-status">Waiting to begin…</div>

  <!-- HOST CONTROLS (only visible on ?host=true) -->
  <div class="host-controls">
    <div class="host-label">Sprint Duration</div>
    <div class="host-controls-row" id="duration-row">
      <button class="duration-btn" onclick="setDuration(15)">15 min</button>
      <button class="duration-btn active" onclick="setDuration(20)">20 min</button>
      <button class="duration-btn" onclick="setDuration(25)">25 min</button>
      <button class="duration-btn" onclick="setDuration(30)">30 min</button>
      <button class="duration-btn" onclick="setDuration(40)">40 min</button>
       <button class="duration-btn" onclick="setDuration(5)">Break</button>
    </div>
    <div class="host-controls-row">
      <button class="big-btn btn-start" id="btn-start" onclick="hostStart()">▶ Start Sprint</button>
      <button class="big-btn btn-end"   id="btn-end"   onclick="hostEnd()"  style="display:none">⏹ End Sprint</button>
      <button class="big-btn btn-next"  id="btn-next"  onclick="hostNext()" style="display:none">→ Next Sprint</button>
      <button class="big-btn btn-reset" id="btn-reset" onclick="hostReset()" style="display:none">↺ Reset All</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HOST: Data entry panel (only visible on ?host=true) -->
  <div class="host-lb-section">
    <h3>📋 Writers &amp; Word Counts</h3>

    <div class="writer-grid" id="writer-grid">
      <!-- headers + writer rows rendered by JS -->
    </div>

    <!-- Bottom actions -->
    <div class="host-action-row">
      <button class="update-lb-btn" onclick="updateLeaderboard()">Update Leaderboard</button>
      <button class="add-sprint-btn" onclick="addSprint()">+ Add Sprint</button>
    </div>

    <!-- Add a new writer -->
    <div class="add-writer-row">
      <span class="add-writer-label">Add writer:</span>
      <select id="add-icon-select" class="small-input" style="font-size:18px; padding:5px 8px;"></select>
      <input type="text" class="small-input" id="add-name" placeholder="Name" style="width:120px"/>
      <button class="add-btn" onclick="hostAddWriter()">+ Add</button>
    </div>
  </div>

  <!-- Leaderboard (visible to everyone) -->
  <div class="leaderboard-card">
    <div class="lb-header">
      <h2>Leaderboard</h2>
      <span id="lb-sprint-label">No sprints yet</span>
    </div>
    <div id="leaderboard-rows"></div>
    <p id="lb-empty">Complete a sprint to see results here.</p>
  </div>

</div>

<script>
// ── CONSTANTS & STATE ─────────────────────────────────────────────────
const ICONS = ['🦔','🐺','🦡','🦝','🐰','🦊','🐻','🦌','🐿️','🦦'];
const SPRINT_COLORS = ['#e07b2a','#b85c1a','#d4922a','#7a9e4a','#4a7a9e','#9e4a7a','#4a9e7a'];

let state = {
  duration: 20,
  currentSprint: 0,     // increments each time host hits Start Sprint
  numSprintCols: 1,     // how many sprint columns are shown in the data-entry grid
  timerRunning: false,
  timerEnd: null,
  timerInterval: null,
  writers: [],          // [{ id, name, icon, goal:0, sprints:[{start,end}] }]
};

const isHost = new URLSearchParams(location.search).has('host');
if (isHost) document.body.classList.add('host');

// ── INIT ──────────────────────────────────────────────────────────────
window.onload = () => {
  renderIconSelect();
  renderWriterGrid();
  renderLeaderboard();
  setTimerDisplay(state.duration * 60);
};

// ── ICON SELECT ───────────────────────────────────────────────────────
function renderIconSelect() {
  const sel = document.getElementById('add-icon-select');
  sel.innerHTML = '';
  ICONS.forEach(icon => {
    const opt = document.createElement('option');
    opt.value = icon;
    opt.textContent = icon;
    sel.appendChild(opt);
  });
}

// ── WRITER GRID ───────────────────────────────────────────────────────
function renderWriterGrid() {
  const grid = document.getElementById('writer-grid');
  grid.innerHTML = '';

  if (state.writers.length === 0) {
    grid.innerHTML = '<p style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:8px">No writers yet — add one below.</p>';
    return;
  }

  // ── Header row ──
  const header = document.createElement('div');
  header.className = 'grid-header';
  let headerHTML = `<div style="width:30px;flex-shrink:0"></div>
                    <div class="grid-header-name">Writer</div>`;
  for (let s = 1; s <= state.numSprintCols; s++) {
    headerHTML += `
      <div class="sprint-col">
        <div class="sprint-col-label" style="color:${SPRINT_COLORS[s-1]}">Sprint ${s}</div>
        <div class="grid-subheader">
          <span>Start</span><span>End</span>
        </div>
      </div>`;
  }
  header.innerHTML = headerHTML;
  grid.appendChild(header);

  // ── One row per writer ──
  state.writers.forEach((w, wi) => {
    const row = document.createElement('div');
    row.className = 'host-writer-row';

    let sprintHTML = '';
    for (let s = 0; s < state.numSprintCols; s++) {
      const sp = w.sprints[s] || {};
      sprintHTML += `
        <div class="sprint-col">
          <div class="sprint-col-inputs">
            <input class="host-wc-input start-input" type="number" placeholder="—"
              value="${sp.start != null ? sp.start : ''}"
              onchange="hostUpdateCount(${wi},${s},'start',this.value)"
              title="Sprint ${s+1} — starting word count"/>
            <input class="host-wc-input end-input" type="number" placeholder="—"
              value="${sp.end != null ? sp.end : ''}"
              onchange="hostUpdateCount(${wi},${s},'end',this.value)"
              title="Sprint ${s+1} — ending word count"/>
          </div>
        </div>`;
    }

    row.innerHTML = `
      <span class="icon-sm">${w.icon}</span>
      <span class="host-writer-name">${w.name}</span>
      ${sprintHTML}
      <button class="remove-btn" onclick="removeWriter(${wi})" title="Remove ${w.name}">✕</button>`;
    grid.appendChild(row);
  });
}

function hostUpdateCount(wi, si, field, val) {
  const w = state.writers[wi];
  while (w.sprints.length <= si) w.sprints.push({});
  w.sprints[si][field] = val === '' ? null : (parseInt(val) || 0);
}

function hostAddWriter() {
  const icon = document.getElementById('add-icon-select').value;
  const name = document.getElementById('add-name').value.trim();
  if (!name) { showToast('Enter a name first.'); return; }
  state.writers.push({ id: Date.now().toString(36), name, icon, goal: 0, sprints: [] });
  document.getElementById('add-name').value = '';
  renderWriterGrid();
  renderLeaderboard();
}

function removeWriter(wi) {
  state.writers.splice(wi, 1);
  renderWriterGrid();
  renderLeaderboard();
}

// ── ADD SPRINT COLUMN ─────────────────────────────────────────────────
function addSprint() {
  state.numSprintCols++;
  renderWriterGrid();
  // Scroll the grid right so the new column is visible
  const grid = document.getElementById('writer-grid');
  grid.scrollLeft = grid.scrollWidth;
  showToast(`Sprint ${state.numSprintCols} column added!`);
}

// ── TIMER CONTROLS ────────────────────────────────────────────────────
function setDuration(mins) {
  state.duration = mins;
  document.querySelectorAll('.duration-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === mins);
  });
  if (!state.timerRunning) setTimerDisplay(mins * 60);
}

function setTimerDisplay(secs) {
  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
  document.getElementById('timer-display').classList.toggle('urgent', secs <= 60 && secs > 0);
}

function hostStart() {
  state.currentSprint++;
  state.timerRunning = true;
  state.timerEnd = Date.now() + state.duration * 60 * 1000;

  document.getElementById('sprint-label').textContent = `SPRINT #${state.currentSprint}`;
  document.getElementById('timer-status').textContent = `Sprint #${state.currentSprint} is live — write!`;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-end').style.display = 'inline-block';
  document.getElementById('duration-row').style.opacity = '0.4';
  document.getElementById('duration-row').style.pointerEvents = 'none';

  playChime('start');

  state.timerInterval = setInterval(() => {
    const left = Math.max(0, Math.round((state.timerEnd - Date.now()) / 1000));
    setTimerDisplay(left);
    if (left === 0) {
      clearInterval(state.timerInterval);
      state.timerRunning = false;
      document.getElementById('timer-status').textContent = `Sprint #${state.currentSprint} complete! Collect word counts.`;
      document.getElementById('btn-end').style.display = 'none';
      document.getElementById('btn-next').style.display = 'inline-block';
      document.getElementById('btn-reset').style.display = 'inline-block';
      playChime('end');
    }
  }, 500);
}

function hostEnd() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  setTimerDisplay(0);
  document.getElementById('timer-status').textContent = `Sprint #${state.currentSprint} ended. Collect word counts.`;
  document.getElementById('btn-end').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('btn-reset').style.display = 'inline-block';
  playChime('end');
}

function hostNext() {
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('duration-row').style.opacity = '';
  document.getElementById('duration-row').style.pointerEvents = '';
  setTimerDisplay(state.duration * 60);
  document.getElementById('timer-status').textContent = 'Ready for next sprint…';
  document.getElementById('sprint-label').textContent = `SPRINT #${state.currentSprint + 1} — READY`;
}

function hostReset() {
  if (!confirm('Reset all sprints and clear the leaderboard?')) return;
  clearInterval(state.timerInterval);
  state.currentSprint = 0;
  state.numSprintCols = 1;
  state.timerRunning = false;
  state.writers.forEach(w => w.sprints = []);

  document.getElementById('sprint-label').textContent = 'WELCOME TO SPRINTS';
  document.getElementById('timer-status').textContent = 'Waiting to begin…';
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('btn-end').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('duration-row').style.opacity = '';
  document.getElementById('duration-row').style.pointerEvents = '';
  setTimerDisplay(state.duration * 60);
  renderWriterGrid();
  renderLeaderboard();
}

// ── LEADERBOARD ───────────────────────────────────────────────────────
function updateLeaderboard() {
  renderLeaderboard();
  showToast('Leaderboard updated!');
  if (state.writers.some(w => w.sprints.some(s => ((s.end || 0) - (s.start || 0)) > 0))) {
    fireConfetti();
  }
}

function renderLeaderboard() {
  const container = document.getElementById('leaderboard-rows');
  const empty = document.getElementById('lb-empty');
  const label = document.getElementById('lb-sprint-label');
  container.innerHTML = '';

  const ranked = state.writers.map(w => {
    const sprintTotals = w.sprints.map(s => Math.max(0, (s.end || 0) - (s.start || 0)));
    const total = sprintTotals.reduce((a, b) => a + b, 0);
    return { ...w, sprintTotals, total };
  });

  const hasData = ranked.some(w => w.total > 0);
  empty.style.display = hasData ? 'none' : 'block';

  if (!hasData) {
    label.textContent = 'No sprints yet';
    return;
  }

  const sorted = [...ranked].sort((a, b) => b.total - a.total);
  const maxTotal = sorted[0]?.total || 1;
  const n = state.numSprintCols;
  label.textContent = `${n} Sprint${n !== 1 ? 's' : ''}`;

  sorted.forEach(w => {
    if (w.total === 0) return;
    const row = document.createElement('div');
    row.className = 'lb-row';

    const segmentsHTML = w.sprintTotals.map((t, i) => {
      const pct = maxTotal > 0 ? (t / maxTotal * 100) : 0;
      return `<div class="lb-segment"
        style="width:${pct}%;background:${SPRINT_COLORS[i]}"
        title="Sprint ${i+1}: +${t.toLocaleString()} words"></div>`;
    }).join('');

    row.innerHTML = `
      <div class="lb-icon">${w.icon}</div>
      <div class="lb-name">${w.name}</div>
      <div class="lb-bar-wrap">${segmentsHTML}</div>
      <div class="lb-total">${w.total.toLocaleString()}</div>
      <div class="lb-star"></div>`;
    container.appendChild(row);
  });
}

// ── SOUND ──────────────────────────────────────────────────────────────
function playChime(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = type === 'start'
      ? [{ f: 523, t: 0 }, { f: 659, t: 0.12 }, { f: 784, t: 0.24 }]
      : [{ f: 784, t: 0 }, { f: 659, t: 0.15 }, { f: 523, t: 0.3 }, { f: 392, t: 0.5 }];
    notes.forEach(({ f, t }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = f;
      gain.gain.setValueAtTime(0.001, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.5);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.6);
    });
  } catch (e) { /* audio not supported */ }
}

// ── CONFETTI ───────────────────────────────────────────────────────────
function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#e07b2a','#f5d57a','#c96a18','#8bbd5a','#4a9ee0','#fff8e7','#8b4513'];
  let particles = Array.from({ length: 140 }, () => ({
    x: Math.random() * canvas.width, y: -20,
    w: Math.random() * 12 + 4, h: Math.random() * 6 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4, vy: Math.random() * 4 + 2,
    angle: Math.random() * Math.PI * 2, spin: (Math.random() - 0.5) * 0.15, opacity: 1
  }));
  let raf;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.opacity -= 0.005;
      ctx.save(); ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y); ctx.rotate(p.angle);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    particles = particles.filter(p => p.opacity > 0);
    if (particles.length) raf = requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  cancelAnimationFrame(raf);
  animate();
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
